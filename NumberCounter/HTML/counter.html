<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="header">
    <header>
    <h1 id="counterTitle">Adrian's Counter</h1>
    </header>
    </div>
    <label id="myCounter">0</label>
    <div id="buttonContainer">
        <button type="button" id="increaseButton" class="counterButton">Increase</button>
        <button type="button" id="decreaseButton" class="counterButton">Decrease</button>
        <button type="button" id="resetButton" class="counterButton">Reset</button>
    </div>

    <script src="../JS/script.js"></script>
